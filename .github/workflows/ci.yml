name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      # Service container matching the docker-compose database image.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: margin
          POSTGRES_USER: margin
          POSTGRES_PASSWORD: margin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,data]"
      - name: Lint
        run: ruff check src tests
      - name: Run migrations
        env:
          MARGIN_DATABASE_URL: postgresql+psycopg://margin:margin@localhost:5432/margin
        run: alembic upgrade head
      - name: Test
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build API image
        run: docker build -t margin-api .
      - name: Build Web image
        run: docker build -t margin-web ./web
      - name: Validate Compose
        run: docker compose config --quiet
