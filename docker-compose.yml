services:
  # PostgreSQL with pgvector extension for embeddings.
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: margin
      POSTGRES_USER: margin
      POSTGRES_PASSWORD: margin
    ports:
      - "5432:5432"
    volumes:
      - margin-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U margin -d margin"]
      interval: 2s
      timeout: 5s
      retries: 20

  # One-shot migration service; runs to completion before seed/api/worker start.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment: &backend-environment
      MARGIN_DATABASE_URL: postgresql+psycopg://margin:margin@postgres:5432/margin
      MARGIN_LLM_BASE_URL: ${MARGIN_LLM_BASE_URL:-}
      MARGIN_LLM_API_KEY: ${MARGIN_LLM_API_KEY:-}
      MARGIN_LLM_MODEL: ${MARGIN_LLM_MODEL:-deepseek-v4-pro}
      MARGIN_EMBEDDING_BASE_URL: ${MARGIN_EMBEDDING_BASE_URL:-}
      MARGIN_EMBEDDING_API_KEY: ${MARGIN_EMBEDDING_API_KEY:-}
      MARGIN_EMBEDDING_MODEL: ${MARGIN_EMBEDDING_MODEL:-embedding-3}
      MARGIN_EMBEDDING_DIMENSION: ${MARGIN_EMBEDDING_DIMENSION:-2048}
      MARGIN_WEBSEARCH_API_KEY: ${MARGIN_WEBSEARCH_API_KEY:-}
      MARGIN_RERANK_BASE_URL: ${MARGIN_RERANK_BASE_URL:-}
      MARGIN_RERANK_API_KEY: ${MARGIN_RERANK_API_KEY:-}
      MARGIN_RERANK_MODEL: ${MARGIN_RERANK_MODEL:-}
      MARGIN_TUSHARE_TOKEN: ${MARGIN_TUSHARE_TOKEN:-}
      MARGIN_TUSHARE_HTTP_URL: ${MARGIN_TUSHARE_HTTP_URL:-}
      MARGIN_SECRET_MASTER_KEY: ${MARGIN_SECRET_MASTER_KEY:-dev-only-change-me-32-byte-key!!}
      MARGIN_SECRET_KEY_VERSION: ${MARGIN_SECRET_KEY_VERSION:-local-v1}
      MARGIN_ADMIN_API_TOKEN: ${MARGIN_ADMIN_API_TOKEN:-dev-admin-token}
      MARGIN_CSRF_TOKEN: ${MARGIN_CSRF_TOKEN:-dev-csrf-token}
      MARGIN_LOG_LEVEL: ${MARGIN_LOG_LEVEL:-INFO}
      MARGIN_LOG_FORMAT: ${MARGIN_LOG_FORMAT:-json}
      MARGIN_METRICS_ENABLED: ${MARGIN_METRICS_ENABLED:-true}
      MARGIN_ENVIRONMENT: ${MARGIN_ENVIRONMENT:-development}
      MARGIN_CAPACITY_LIMIT_VERSION: ${MARGIN_CAPACITY_LIMIT_VERSION:-limits-v0.2.0}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "scripts/migrate.py"]
    restart: "no"

  # One-shot versioned config bootstrap; imports env secrets into Secret Store.
  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "scripts/bootstrap_config.py"]
    restart: "no"

  # Main API service exposing REST endpoints and Prometheus metrics.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *backend-environment
    ports:
      - "8000:8000"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    volumes:
      # Persistent volumes for audit logs and snapshots survive container restarts.
      - margin-audit:/app/.margin/audit
      - margin-snapshots:/app/.margin/snapshots
    command: ["uvicorn", "margin.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "scripts/health_check.py"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # Background worker (runs scheduled or async tasks).
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *backend-environment
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - margin-audit:/app/.margin/audit
      - margin-snapshots:/app/.margin/snapshots
    command: ["python", "-m", "margin.worker"]
    healthcheck:
      test: ["CMD", "python", "scripts/worker_health_check.py"]
      interval: 30s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  # Next.js frontend.
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      MARGIN_API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Prometheus scrapes the API /metrics endpoint.
  prometheus:
    image: prom/prometheus:v3.12.0
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Grafana visualizes Prometheus metrics with provisioned dashboards.
  grafana:
    image: grafana/grafana:13.0.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-margin}
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - margin-grafana:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

volumes:
  margin-postgres:
  margin-audit:
  margin-snapshots:
  margin-grafana:
