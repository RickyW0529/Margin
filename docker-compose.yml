services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: margin
      POSTGRES_USER: margin
      POSTGRES_PASSWORD: margin
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U margin -d margin"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - margin-postgres:/var/lib/postgresql/data

volumes:
  margin-postgres:
